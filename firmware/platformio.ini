[platformio]
default_envs = nulllab_esp32s3_cam

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_flags =
  -DCORE_DEBUG_LEVEL=0

[env:nulllab_esp32s3_cam]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_8MB.csv
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DSEGTORI_CAMERA_NULLLAB_ESP32S3

[env:ai_thinker_esp32cam]
board = esp32cam
build_flags =
  ${env.build_flags}
  -DSEGTORI_CAMERA_AI_THINKER
