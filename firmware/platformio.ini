[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
monitor_port = /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_A5069RR4-if00-port0
upload_port = /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_A5069RR4-if00-port0
upload_speed = 460800
build_flags =
  -DCORE_DEBUG_LEVEL=3
